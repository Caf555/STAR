<!DOCTYPE html>
<html lang="zh-TW" data-fontsize="md" data-fx="on">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星淵迴響 — STAR: Abyssal Echoes</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='24' font-size='24' text-anchor='middle'%3E%F0%9F%8C%8C%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="starfield" aria-hidden="true"></div>

    <!-- ============ 主選單 ============ -->
    <section id="screen-menu" class="screen active" aria-label="主選單">
        <div class="menu-title-block">
            <div class="menu-title-kicker">STAR: Abyssal Echoes</div>
            <h1 class="menu-title">星淵迴響</h1>
            <div class="menu-title-sub">弦斷之處,它在聽</div>
        </div>
        <nav class="menu-buttons">
            <button id="btn-new" class="menu-btn" type="button">▸ 新遊戲</button>
            <button id="btn-continue" class="menu-btn" type="button" disabled>▸ 繼續(自動存檔)</button>
            <button id="btn-load" class="menu-btn" type="button">▸ 讀取存檔</button>
            <button id="btn-demo" class="menu-btn" type="button">▸ 引擎示範場景</button>
            <button id="btn-settings" class="menu-btn" type="button">▸ 設定</button>
        </nav>
        <div id="menu-version" class="menu-version"></div>
    </section>

    <!-- ============ 角色創建 ============ -->
    <section id="screen-create" class="screen" aria-label="角色創建">
        <div class="create-wrap">
            <h1 class="create-title">建立你的角色</h1>
            <div id="create-head" class="create-head"></div>
            <div id="create-body" class="create-body"></div>
        </div>
    </section>

    <!-- ============ 遊戲畫面 ============ -->
    <section id="screen-game" class="screen" aria-label="遊戲畫面">
        <header class="hud-header">
            <div class="hud-logo">星淵迴響</div>
            <div id="hud-chapter" class="hud-chapter"></div>
            <div class="hud-header-btns">
                <button id="btn-game-save" class="icon-btn" type="button">💾 存讀檔</button>
                <button id="btn-game-settings" class="icon-btn" type="button">⚙ 設定</button>
                <button id="btn-game-menu" class="icon-btn" type="button">☰ 主選單</button>
            </div>
        </header>

        <div class="hud-grid">
            <!-- 左欄:小隊 / 艦船 -->
            <aside id="panel-left" class="hud-panel" aria-label="小隊狀態">
                <div class="panel-block">
                    <h3>小隊狀態</h3>
                    <div class="member-name"><span id="hud-player-name"></span>
                        <span class="cls" id="hud-player-class"></span></div>
                    <div class="stat-row"><span class="label">等級</span><span class="value" id="hud-level"></span></div>
                    <div class="stat-row"><span class="label">生命</span><span class="value" id="hud-hp"></span></div>
                    <div class="bar hp"><i id="hud-hp-bar"></i></div>
                    <div class="stat-row"><span class="label">能量</span><span class="value" id="hud-ep"></span></div>
                    <div class="bar ep"><i id="hud-ep-bar"></i></div>
                    <div class="stat-row"><span class="label">侵蝕</span><span class="value" id="hud-erosion"></span></div>
                    <div class="bar erosion"><i id="hud-erosion-bar"></i></div>
                    <div class="stat-row"><span class="label">學分</span><span class="value" id="hud-credits"></span></div>
                    <div id="hud-party"></div>
                </div>
                <div class="panel-block">
                    <h3>迴響號</h3>
                    <div id="hud-ship"></div>
                </div>
            </aside>

            <!-- 中欄:敘事 -->
            <main id="narrative-wrap" aria-live="polite">
                <div id="narrative"></div>
                <div id="choices" role="menu"></div>

                <!-- 戰鬥介面(覆蓋敘事區) -->
                <div id="combat" aria-label="戰鬥">
                    <div class="cb-zone"><h3>敵方</h3><div id="cb-enemies" class="cb-cards"></div></div>
                    <div id="cb-log" aria-live="polite"></div>
                    <div class="cb-zone"><h3>我方</h3><div id="cb-allies" class="cb-cards"></div></div>
                    <div id="cb-actions"></div>
                    <div id="cb-result"></div>
                </div>

                <!-- 艦船戰介面 -->
                <div id="shipcombat" aria-label="艦船戰">
                    <div id="sc-bands" class="sc-bands"></div>
                    <div class="sc-ships-row">
                        <div id="sc-player" class="sc-ship"></div>
                        <div id="sc-enemy" class="sc-ship"></div>
                    </div>
                    <div id="sc-log" aria-live="polite"></div>
                    <div id="sc-actions"></div>
                    <div id="sc-result"></div>
                </div>
            </main>

            <!-- 右欄:任務 / 所在地 / 快捷 -->
            <aside id="panel-right" class="hud-panel" aria-label="任務與導航">
                <button id="btn-panel-toggle" class="hud-panel-toggle" type="button" aria-expanded="true" aria-controls="panel-right-body">▾ 收合資訊面板</button>
                <div id="panel-right-body" class="hud-panel-body">
                    <div class="panel-block panel-quest">
                        <h3>任務追蹤</h3>
                        <div id="hud-quests"></div>
                    </div>
                    <div class="panel-block panel-loc">
                        <h3>所在地</h3>
                        <div class="loc-name" id="hud-loc-name"></div>
                        <div class="loc-sub" id="hud-loc-sub"></div>
                    </div>
                    <div class="panel-block panel-sys">
                        <h3>系統</h3>
                        <div class="shortcut-grid">
                            <button class="icon-btn" type="button" id="btn-char">👤 角色/背包</button>
                            <button class="icon-btn" type="button" id="btn-map">🗺 星圖</button>
                            <button class="icon-btn" type="button" id="btn-tech">🔬 科技/製造</button>
                            <button class="icon-btn" type="button" id="btn-party">⚔ 小隊</button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </section>

    <!-- ============ 存讀檔視窗 ============ -->
    <div id="modal-slots" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-head">
                <h2 id="slots-title">存檔</h2>
                <button class="icon-btn" type="button" data-close="modal-slots">✕ 關閉</button>
            </div>
            <div class="modal-body">
                <div id="slot-list" class="slot-list"></div>
                <div class="modal-note">
                    存檔保存在瀏覽器 localStorage;可「匯出」為 JSON 檔備份,或在下方匯入其他裝置的存檔。<br><br>
                    <label class="icon-btn" style="display:inline-block;cursor:pointer">
                        ⇪ 匯入存檔檔案<input id="btn-import" type="file" accept=".json,application/json" hidden>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ 設定視窗 ============ -->
    <div id="modal-settings" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-head">
                <h2>設定</h2>
                <button class="icon-btn" type="button" data-close="modal-settings">✕ 關閉</button>
            </div>
            <div class="modal-body">
                <div class="setting-row">
                    <span>打字機文字效果</span>
                    <span class="seg">
                        <button class="icon-btn" type="button" data-setting="typewriter" data-value="true">開</button>
                        <button class="icon-btn" type="button" data-setting="typewriter" data-value="false">關</button>
                    </span>
                </div>
                <div class="setting-row">
                    <span>字級</span>
                    <span class="seg">
                        <button class="icon-btn" type="button" data-setting="fontSize" data-value="sm">小</button>
                        <button class="icon-btn" type="button" data-setting="fontSize" data-value="md">中</button>
                        <button class="icon-btn" type="button" data-setting="fontSize" data-value="lg">大</button>
                    </span>
                </div>
                <div class="setting-row">
                    <span>背景動效(掃描線)</span>
                    <span class="seg">
                        <button class="icon-btn" type="button" data-setting="fx" data-value="true">開</button>
                        <button class="icon-btn" type="button" data-setting="fx" data-value="false">關</button>
                    </span>
                </div>
                <div class="setting-row">
                    <span>音效</span>
                    <span class="seg">
                        <button class="icon-btn" type="button" data-setting="sfxOn" data-value="true">開</button>
                        <button class="icon-btn" type="button" data-setting="sfxOn" data-value="false">關</button>
                    </span>
                </div>
                <div class="setting-row">
                    <span>背景音樂</span>
                    <span class="seg">
                        <button class="icon-btn" type="button" data-setting="musicOn" data-value="true">開</button>
                        <button class="icon-btn" type="button" data-setting="musicOn" data-value="false">關</button>
                    </span>
                </div>
                <div class="setting-row">
                    <span>音量</span>
                    <input id="setting-volume" class="vol-slider" type="range" min="0" max="100" value="60" aria-label="音量">
                </div>
                <div class="modal-note">鍵盤操作:數字鍵 1–9 選擇選項;Esc 關閉視窗;點擊敘事區可跳過打字效果。全部音效皆為即時合成,無需下載音檔。</div>
            </div>
        </div>
    </div>

    <!-- ============ 星圖 ============ -->
    <div id="modal-starmap" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal modal-wide">
            <div class="modal-head">
                <h2>幽弦星區・星圖</h2>
                <button class="icon-btn" type="button" data-close="modal-starmap">✕ 關閉</button>
            </div>
            <div class="modal-body">
                <svg id="starmap-svg" viewBox="0 0 660 440" role="img" aria-label="星區地圖"></svg>
                <div id="starmap-fuel" class="modal-note"></div>
            </div>
        </div>
    </div>

    <!-- ============ 商店 ============ -->
    <div id="modal-shop" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-head">
                <h2 id="shop-title">商店</h2>
                <button class="icon-btn" type="button" data-close="modal-shop">✕ 關閉</button>
            </div>
            <div class="modal-body">
                <div class="shop-bar">
                    <span class="seg">
                        <button class="icon-btn" type="button" id="shop-tab-buy">購買</button>
                        <button class="icon-btn" type="button" id="shop-tab-sell">出售</button>
                    </span>
                    <span id="shop-credits" class="shop-credits"></span>
                </div>
                <div id="shop-list" class="slot-list"></div>
            </div>
        </div>
    </div>

    <!-- ============ 科技/製造 ============ -->
    <div id="modal-tech" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-head">
                <h2>科技與製造</h2>
                <button class="icon-btn" type="button" data-close="modal-tech">✕ 關閉</button>
            </div>
            <div class="modal-body">
                <div class="shop-bar">
                    <span class="seg">
                        <button class="icon-btn" type="button" id="tech-tab-tech">科技樹</button>
                        <button class="icon-btn" type="button" id="tech-tab-craft">製造</button>
                    </span>
                    <span id="tech-cores" class="shop-credits"></span>
                </div>
                <div id="tech-list" class="slot-list"></div>
            </div>
        </div>
    </div>

    <!-- ============ 小隊管理 ============ -->
    <div id="modal-party" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-head">
                <h2>小隊</h2>
                <button class="icon-btn" type="button" data-close="modal-party">✕ 關閉</button>
            </div>
            <div class="modal-body" id="party-body"></div>
        </div>
    </div>

    <!-- ============ 角色面板 ============ -->
    <div id="modal-char" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-head">
                <h2>角色</h2>
                <button class="icon-btn" type="button" data-close="modal-char">✕ 關閉</button>
            </div>
            <div class="modal-body" id="char-body"></div>
        </div>
    </div>

    <div id="toast-stack" aria-live="polite"></div>

    <!-- 引擎(與內容無關) -->
    <script src="js/data/strings.js"></script>
    <script src="js/engine/state.js"></script>
    <script src="js/engine/check.js"></script>
    <script src="js/engine/save.js"></script>
    <script src="js/engine/scene.js"></script>
    <script src="js/engine/combat.js"></script>
    <script src="js/engine/shipCombat.js"></script>
    <script src="js/engine/create.js"></script>
    <script src="js/engine/starmap.js"></script>
    <script src="js/engine/shop.js"></script>
    <script src="js/engine/tech.js"></script>
    <script src="js/engine/audio.js"></script>
    <script src="js/engine/ui.js"></script>
    <script src="js/engine/core.js"></script>
    <!-- 內容資料 -->
    <script src="js/data/world.js"></script>
    <script src="js/data/origins.js"></script>
    <script src="js/data/items.js"></script>
    <script src="js/data/enemies.js"></script>
    <script src="js/data/techtree.js"></script>
    <script src="js/data/ships.js"></script>
    <script src="js/data/companions.js"></script>
    <script src="js/data/prologue.js"></script>
    <script src="js/data/chapter1.js"></script>
    <script src="js/data/chapter2.js"></script>
    <script src="js/data/chapter3.js"></script>
    <script src="js/data/chapter4.js"></script>
    <script src="js/data/chapter5.js"></script>
    <script src="js/data/companion_quests.js"></script>
    <script src="js/data/demo.js"></script>
</body>
</html>
