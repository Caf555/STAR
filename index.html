<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Art Control Panel - STAR v1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a1a;
            --bg-darker: #0f0f0f;
            --bg-panel: #252525;
            --bg-hover: #2f2f2f;
            --border-color: #3a3a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-blue: #4a9eff;
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --accent-orange: #ff9800;
            --accent-purple: #9c27b0;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', '微软正黑体', Tahoma, sans-serif;
            background: var(--bg-darker);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .header-left .version {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .file-upload-btn {
            padding: 8px 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .file-upload-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Left Panel */
        .left-panel {
            width: 420px;
            background: var(--bg-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-section {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* AI Input Section */
        .ai-input-area {
            width: 100%;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .ai-input-area:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .generate-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: var(--accent-purple);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .generate-btn:hover {
            background: #7b1fa2;
            transform: translateY(-1px);
        }

        /* Tag Display */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            min-height: 32px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag.style-tag {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }

        .tag.character-tag {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .tag:hover {
            background: var(--bg-hover);
        }

        .tag-remove {
            cursor: pointer;
            font-weight: bold;
        }

        /* Prompt Editor */
        .prompt-editor {
            width: 100%;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 13px;
            resize: vertical;
            min-height: 120px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .prompt-editor:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
        }

        /* ComfyUI Config */
        .config-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .config-label {
            min-width: 80px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .config-input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .config-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
            cursor: pointer;
        }

        .status-indicator.online {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        .status-indicator.offline {
            background: var(--accent-red);
        }

        .render-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .render-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 158, 255, 0.4);
        }

        /* Right Panel */
        .right-panel {
            flex: 1;
            background: var(--bg-darker);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
        }

        .tab {
            padding: 14px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* Style Cards */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .style-card {
            background: var(--bg-panel);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .style-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .style-card.selected {
            border-color: var(--accent-orange);
            background: rgba(255, 152, 0, 0.1);
        }

        .style-card-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .style-card-tag {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        /* Character DB */
        .character-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-select {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .character-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .character-item {
            background: var(--bg-panel);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .character-item:hover {
            border-color: var(--accent-purple);
            transform: translateY(-2px);
        }

        .character-name {
            font-size: 13px;
            font-weight: 600;
        }

        .character-series {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Storyboard */
        .storyboard-step {
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .step-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent-blue);
        }

        .storyboard-frames {
            display: grid;
            gap: 12px;
        }

        .frame-item {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
        }

        .frame-number {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .frame-prompt {
            font-size: 13px;
            color: var(--text-primary);
            font-family: monospace;
            word-wrap: break-word;
        }

        /* History Gallery */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .history-item {
            background: var(--bg-panel);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .history-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .history-image {
            width: 100%;
            height: 200px;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            position: relative;
        }

        .history-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-status {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-queue {
            background: var(--accent-orange);
            color: white;
        }

        .status-success {
            background: var(--accent-green);
            color: white;
        }

        .status-failed {
            background: var(--accent-red);
            color: white;
        }

        .history-actions {
            display: flex;
            gap: 8px;
            padding: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 6px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 20px 16px;
            cursor: pointer;
            font-size: 24px;
            border-radius: 6px;
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Utility */
        .hidden {
            display: none !important;
        }

        input[type="number"] {
            width: 80px;
        }

        .dice-btn {
            padding: 8px 12px;
            background: var(--accent-green);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dice-btn:hover {
            background: #388e3c;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-panel);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: var(--accent-blue);
        }

        .mode-btn.active {
            border-color: var(--accent-blue);
            background: rgba(74, 158, 255, 0.1);
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>STAR - AI Art Control Panel <span class="version">v1.0</span></h1>
        </div>
        <div class="header-right">
            <label class="file-upload-btn">
                上傳 Artist Tag CSV
                <input type="file" id="csvUpload" accept=".csv" style="display: none;">
            </label>
            <label class="file-upload-btn">
                上傳 Images ZIP
                <input type="file" id="zipUpload" accept=".zip" style="display: none;">
            </label>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- AI Input Section -->
            <div class="panel-section">
                <div class="section-title">AI 文字輸入</div>
                <textarea
                    id="aiInput"
                    class="ai-input-area"
                    placeholder="輸入中文或英文描述，例如：一個魔法少女在森林裡..."
                ></textarea>
                <button class="generate-btn" onclick="generatePrompt()">
                    🪄 AI 生成提示詞
                </button>
            </div>

            <!-- Prompt Editor Section -->
            <div class="panel-section">
                <div class="section-title">提示詞編輯器</div>

                <!-- Tags Display -->
                <div class="tag-container" id="styleTags"></div>
                <div class="tag-container" id="characterTags"></div>

                <!-- Prompt Editor -->
                <textarea
                    id="promptEditor"
                    class="prompt-editor"
                    placeholder="最終提示詞將在此顯示..."
                ></textarea>

                <!-- Editor Buttons -->
                <div class="button-group">
                    <button class="btn" onclick="clearPrompt()">🗑️ 清空</button>
                    <button class="btn" onclick="copyPrompt()">📋 複製</button>
                </div>
            </div>

            <!-- ComfyUI Config Section -->
            <div class="panel-section">
                <div class="section-title">ComfyUI 設定</div>

                <div class="config-row">
                    <span class="config-label">伺服器</span>
                    <input
                        type="text"
                        id="comfyUrl"
                        class="config-input"
                        value="http://127.0.0.1:8188"
                        placeholder="ComfyUI URL"
                    >
                    <div
                        class="status-indicator"
                        id="connectionStatus"
                        onclick="testConnection()"
                        title="點擊測試連線"
                    ></div>
                </div>

                <div class="config-row">
                    <span class="config-label">大模型</span>
                    <select id="checkpointModel" class="config-input">
                        <option value="NetaYumev35_pretrained_all_in_one.safetensors">NetaYume v35 (推薦)</option>
                        <option value="netayume_lumina.safetensors">NetaYume Lumina</option>
                    </select>
                </div>

                <div class="config-row">
                    <span class="config-label">放大模型</span>
                    <select id="upscaleModel" class="config-input">
                        <option value="RealESRGAN_x4plus.pth">RealESRGAN x4 (推薦)</option>
                        <option value="RealESRGAN_x4plus_anime_6B.pth">RealESRGAN Anime x4</option>
                        <option value="ESRGAN_4x.pth">ESRGAN x4</option>
                    </select>
                </div>

                <div class="config-row">
                    <span class="config-label">寬度</span>
                    <input
                        type="number"
                        id="imageWidth"
                        class="config-input"
                        value="832"
                        min="256"
                        max="2048"
                        step="64"
                    >
                    <span class="config-label">高度</span>
                    <input
                        type="number"
                        id="imageHeight"
                        class="config-input"
                        value="1216"
                        min="256"
                        max="2048"
                        step="64"
                    >
                </div>

                <button class="render-btn" onclick="renderImage()">
                    ⚡ 極速生圖
                </button>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('styles')">風格選擇</div>
                <div class="tab" onclick="switchTab('characters')">角色圖鑑</div>
                <div class="tab" onclick="switchTab('storyboard')">劇情分鏡</div>
                <div class="tab" onclick="switchTab('history')">歷史紀錄</div>
            </div>

            <!-- Styles Tab -->
            <div class="tab-content active" id="stylesTab">
                <h3 style="margin-bottom: 16px;">內建知名風格</h3>
                <div class="style-grid" id="builtinStyles"></div>

                <div style="margin: 30px 0; display: flex; align-items: center; gap: 12px;">
                    <h3>自訂風格</h3>
                    <button class="dice-btn" onclick="randomStyle()">🎲 隨機選擇</button>
                </div>
                <div class="style-grid" id="customStyles">
                    <p style="color: var(--text-secondary);">請上傳 Artist Tag CSV 檔案以載入自訂風格</p>
                </div>
            </div>

            <!-- Characters Tab -->
            <div class="tab-content" id="charactersTab">
                <div class="character-filters">
                    <select id="categoryFilter" class="filter-select" onchange="updateSeriesFilter()">
                        <option value="">選擇作品分類</option>
                    </select>
                    <select id="seriesFilter" class="filter-select" onchange="updateCharacterList()">
                        <option value="">選擇作品名稱</option>
                    </select>
                </div>
                <div class="character-list" id="characterList">
                    <p style="color: var(--text-secondary);">請選擇作品分類與名稱以顯示角色</p>
                </div>
            </div>

            <!-- Storyboard Tab -->
            <div class="tab-content" id="storyboardTab">
                <!-- Step 1: Planning -->
                <div class="storyboard-step">
                    <div class="step-title">步驟 1：規劃劇本</div>

                    <div class="config-row" style="margin-bottom: 12px;">
                        <span class="config-label">張數</span>
                        <input
                            type="number"
                            id="frameCount"
                            class="config-input"
                            value="4"
                            min="2"
                            max="10"
                        >
                    </div>

                    <textarea
                        id="storyInput"
                        class="ai-input-area"
                        style="min-height: 100px;"
                        placeholder="輸入劇本基礎指令，例如：魔法少女從日常生活變身戰鬥的過程..."
                    ></textarea>

                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="stacking" onclick="selectMode(this)">
                            疊加 (Stacking)
                        </button>
                        <button class="mode-btn" data-mode="event" onclick="selectMode(this)">
                            事件 (Event)
                        </button>
                        <button class="mode-btn" data-mode="story" onclick="selectMode(this)">
                            劇情 (Story)
                        </button>
                    </div>

                    <button class="generate-btn" onclick="generateStoryboard()">
                        📝 生成分鏡提示詞
                    </button>
                </div>

                <!-- Step 2: Generated Frames -->
                <div class="storyboard-step">
                    <div class="step-title">步驟 2：分鏡提示詞</div>
                    <div class="storyboard-frames" id="storyboardFrames">
                        <p style="color: var(--text-secondary);">分鏡提示詞將在此顯示</p>
                    </div>
                </div>

                <!-- Step 3: Batch Render -->
                <div class="storyboard-step">
                    <div class="step-title">步驟 3：批次發送</div>

                    <div class="mode-selector">
                        <button class="mode-btn active" data-seed="first-random" onclick="selectSeedMode(this)">
                            首圖隨機，其餘固定
                        </button>
                        <button class="mode-btn" data-seed="all-random" onclick="selectSeedMode(this)">
                            全數隨機
                        </button>
                        <button class="mode-btn" data-seed="fixed" onclick="selectSeedMode(this)">
                            指定數值
                        </button>
                    </div>

                    <div class="config-row" style="margin-top: 12px;">
                        <span class="config-label">種子值</span>
                        <input
                            type="number"
                            id="seedValue"
                            class="config-input"
                            value="-1"
                            disabled
                        >
                    </div>

                    <button class="render-btn" onclick="batchRender()">
                        🚀 批次生圖
                    </button>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-content" id="historyTab">
                <div class="history-grid" id="historyGrid"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">✕ 關閉</button>
            <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">‹</button>
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">›</button>
        </div>
    </div>

    <script>
        // ==================== Global State ====================
        const appState = {
            selectedStyles: [],
            selectedCharacters: [],
            customArtists: [],
            characterDatabase: {},
            storyboardFrames: [],
            storyboardMode: 'stacking',
            seedMode: 'first-random',
            seedValue: -1,
            history: [],
            lightboxIndex: 0,
            lmStudioUrl: 'http://localhost:1234/v1/chat/completions'
        };

        // ==================== Built-in Styles ====================
        const builtinStyles = [
            { name: '新海誠', tag: '@shinkai_makoto', nameEn: 'Makoto Shinkai' },
            { name: '吉卜力', tag: '@studio_ghibli', nameEn: 'Studio Ghibli' },
            { name: '京都動畫', tag: '@kyoto_animation', nameEn: 'Kyoto Animation' },
            { name: 'CLAMP', tag: '@clamp', nameEn: 'CLAMP' },
            { name: '貞本義行', tag: '@sadamoto_yoshiyuki', nameEn: 'Yoshiyuki Sadamoto' },
            { name: '藤島康介', tag: '@fujishima_kousuke', nameEn: 'Kosuke Fujishima' }
        ];

        // ==================== Character Database ====================
        const characterDatabase = {
            '動漫': {
                '魔法少女小圓': [
                    { name: '鹿目圓', tag: '#kaname_madoka', series: 'madoka_magica' },
                    { name: '曉美焰', tag: '#akemi_homura', series: 'madoka_magica' },
                    { name: '美樹沙耶香', tag: '#miki_sayaka', series: 'madoka_magica' }
                ],
                '新世紀福音戰士': [
                    { name: '綾波零', tag: '#ayanami_rei', series: 'evangelion' },
                    { name: '式波·明日香', tag: '#asuka_langley', series: 'evangelion' },
                    { name: '真希波', tag: '#makinami_mari', series: 'evangelion' }
                ],
                '名侦探柯南': [
                    { name: '毛利蘭', tag: '#mouri_ran', series: 'detective_conan' },
                    { name: '灰原哀', tag: '#haibara_ai', series: 'detective_conan' }
                ]
            },
            '遊戲': {
                '原神': [
                    { name: '雷電將軍', tag: '#raiden_shogun', series: 'genshin_impact' },
                    { name: '甘雨', tag: '#ganyu', series: 'genshin_impact' },
                    { name: '胡桃', tag: '#hu_tao', series: 'genshin_impact' }
                ],
                '碧藍航線': [
                    { name: '企業', tag: '#enterprise', series: 'azur_lane' },
                    { name: '貝爾法斯特', tag: '#belfast', series: 'azur_lane' }
                ]
            }
        };

        // ==================== Initialization ====================
        window.onload = function() {
            initializeApp();
            loadHistory();
            testConnection();
        };

        function initializeApp() {
            // Render builtin styles
            renderBuiltinStyles();

            // Initialize character database
            appState.characterDatabase = characterDatabase;
            initializeCharacterFilters();

            // Set character database to state
            updateCharacterFilters();

            // Auto-test connection every 30 seconds
            setInterval(testConnection, 30000);

            // Load history from localStorage
            const savedHistory = localStorage.getItem('starHistory');
            if (savedHistory) {
                appState.history = JSON.parse(savedHistory);
                renderHistory();
            }
        }

        // ==================== Style Functions ====================
        function renderBuiltinStyles() {
            const container = document.getElementById('builtinStyles');
            container.innerHTML = '';

            builtinStyles.forEach(style => {
                const card = document.createElement('div');
                card.className = 'style-card';
                card.onclick = () => toggleStyle(style);

                card.innerHTML = `
                    <div class="style-card-name">${style.name}</div>
                    <div class="style-card-tag">${style.tag}</div>
                `;

                if (appState.selectedStyles.find(s => s.tag === style.tag)) {
                    card.classList.add('selected');
                }

                container.appendChild(card);
            });
        }

        function toggleStyle(style) {
            const index = appState.selectedStyles.findIndex(s => s.tag === style.tag);

            if (index >= 0) {
                appState.selectedStyles.splice(index, 1);
            } else {
                appState.selectedStyles.push(style);
            }

            updateStyleTags();
            renderBuiltinStyles();
            updatePrompt();
        }

        function updateStyleTags() {
            const container = document.getElementById('styleTags');
            container.innerHTML = '';

            appState.selectedStyles.forEach(style => {
                const tag = document.createElement('div');
                tag.className = 'tag style-tag';
                tag.innerHTML = `
                    <span>${style.name} ${style.tag}</span>
                    <span class="tag-remove" onclick="removeStyle('${style.tag}')">✕</span>
                `;
                container.appendChild(tag);
            });
        }

        function removeStyle(tagValue) {
            appState.selectedStyles = appState.selectedStyles.filter(s => s.tag !== tagValue);
            updateStyleTags();
            renderBuiltinStyles();
            updatePrompt();
        }

        function randomStyle() {
            if (appState.customArtists.length === 0) {
                alert('請先上傳 Artist Tag CSV 檔案');
                return;
            }

            const randomArtist = appState.customArtists[
                Math.floor(Math.random() * appState.customArtists.length)
            ];

            toggleStyle(randomArtist);
        }

        // ==================== Character Functions ====================
        function initializeCharacterFilters() {
            const categoryFilter = document.getElementById('categoryFilter');
            const categories = Object.keys(characterDatabase);

            categoryFilter.innerHTML = '<option value="">選擇作品分類</option>';
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilter.appendChild(option);
            });
        }

        function updateCharacterFilters() {
            updateSeriesFilter();
        }

        function updateSeriesFilter() {
            const categoryFilter = document.getElementById('categoryFilter');
            const seriesFilter = document.getElementById('seriesFilter');
            const category = categoryFilter.value;

            seriesFilter.innerHTML = '<option value="">選擇作品名稱</option>';

            if (category && characterDatabase[category]) {
                const series = Object.keys(characterDatabase[category]);
                series.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s;
                    option.textContent = s;
                    seriesFilter.appendChild(option);
                });
            }

            updateCharacterList();
        }

        function updateCharacterList() {
            const categoryFilter = document.getElementById('categoryFilter');
            const seriesFilter = document.getElementById('seriesFilter');
            const characterList = document.getElementById('characterList');

            const category = categoryFilter.value;
            const series = seriesFilter.value;

            characterList.innerHTML = '';

            if (!category || !series) {
                characterList.innerHTML = '<p style="color: var(--text-secondary);">請選擇作品分類與名稱以顯示角色</p>';
                return;
            }

            const characters = characterDatabase[category][series];

            characters.forEach(char => {
                const item = document.createElement('div');
                item.className = 'character-item';
                item.onclick = () => addCharacter(char);

                item.innerHTML = `
                    <div class="character-name">${char.name}</div>
                    <div class="character-series">${char.tag}</div>
                `;

                characterList.appendChild(item);
            });
        }

        function addCharacter(character) {
            const exists = appState.selectedCharacters.find(c => c.tag === character.tag);
            if (exists) {
                alert('此角色已經加入');
                return;
            }

            appState.selectedCharacters.push(character);
            updateCharacterTags();
            updatePrompt();
        }

        function updateCharacterTags() {
            const container = document.getElementById('characterTags');
            container.innerHTML = '';

            appState.selectedCharacters.forEach(char => {
                const tag = document.createElement('div');
                tag.className = 'tag character-tag';
                tag.innerHTML = `
                    <span>${char.name} ${char.tag}</span>
                    <span class="tag-remove" onclick="removeCharacter('${char.tag}')">✕</span>
                `;
                container.appendChild(tag);
            });
        }

        function removeCharacter(tagValue) {
            appState.selectedCharacters = appState.selectedCharacters.filter(c => c.tag !== tagValue);
            updateCharacterTags();
            updatePrompt();
        }

        // ==================== Prompt Functions ====================
        function updatePrompt() {
            const editor = document.getElementById('promptEditor');

            let prompt = '';

            // Add style tags
            if (appState.selectedStyles.length > 0) {
                prompt += appState.selectedStyles.map(s => s.tag).join(', ') + ', ';
            }

            // Add character tags
            if (appState.selectedCharacters.length > 0) {
                prompt += appState.selectedCharacters.map(c => c.tag).join(', ') + ', ';
            }

            // Keep existing description
            const currentPrompt = editor.value;
            const descMatch = currentPrompt.match(/[^@#][^,]*/g);
            if (descMatch) {
                prompt += descMatch.filter(d => d.trim()).join(', ');
            }

            editor.value = prompt.trim();
        }

        function clearPrompt() {
            if (!confirm('確定要清空提示詞嗎？（將保留已選標籤）')) return;

            document.getElementById('promptEditor').value = '';
            updatePrompt();
        }

        function copyPrompt() {
            const editor = document.getElementById('promptEditor');
            editor.select();
            document.execCommand('copy');
            alert('已複製到剪貼簿');
        }

        // ==================== AI Generation ====================
        async function generatePrompt() {
            const input = document.getElementById('aiInput').value.trim();

            if (!input) {
                alert('請輸入描述');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            try {
                const systemPrompt = `You are a prompt generator for NetaYume Lumina, an anime-style AI art model.

Rules:
1. Character tags MUST use # prefix (e.g., #kaname_madoka)
2. Artist/style tags MUST use @ prefix (e.g., @shinkai_makoto)
3. Generate natural, detailed English descriptions
4. Focus on visual elements: pose, expression, clothing, lighting, atmosphere
5. Keep tags lowercase with underscores
6. Output format: tags first, then description

Example output:
#mouri_ran, @kyoto_animation, 1girl, long hair, blue eyes, standing in garden, soft sunlight, gentle smile, white dress, flowers blooming, peaceful atmosphere`;

                const response = await fetch(appState.lmStudioUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "local-model",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: input }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error('LM Studio 連線失敗');
                }

                const data = await response.json();
                let generatedText = data.choices[0].message.content;

                // Fix symbol formatting
                generatedText = generatedText.replace(/\*([a-z_]+)/g, '#$1');  // *tag -> #tag
                generatedText = generatedText.replace(/\*\*([a-z_]+)/g, '@$1'); // **tag -> @tag

                // Update prompt editor
                const editor = document.getElementById('promptEditor');

                // Combine existing tags with new description
                let finalPrompt = '';
                if (appState.selectedStyles.length > 0) {
                    finalPrompt += appState.selectedStyles.map(s => s.tag).join(', ') + ', ';
                }
                if (appState.selectedCharacters.length > 0) {
                    finalPrompt += appState.selectedCharacters.map(c => c.tag).join(', ') + ', ';
                }
                finalPrompt += generatedText;

                editor.value = finalPrompt.trim();

            } catch (error) {
                console.error('AI generation error:', error);
                alert('AI 生成失敗: ' + error.message + '\n\n請確認 LM Studio 是否正在運行於 http://localhost:1234');
            } finally {
                btn.disabled = false;
                btn.textContent = '🪄 AI 生成提示詞';
            }
        }

        // ==================== Storyboard Functions ====================
        function selectMode(button) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if (btn.closest('.storyboard-step')) {
                    btn.classList.remove('active');
                }
            });
            button.classList.add('active');
            appState.storyboardMode = button.dataset.mode;
        }

        function selectSeedMode(button) {
            document.querySelectorAll('[data-seed]').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            appState.seedMode = button.dataset.seed;

            const seedInput = document.getElementById('seedValue');
            if (appState.seedMode === 'fixed') {
                seedInput.disabled = false;
                seedInput.value = Math.floor(Math.random() * 1000000);
            } else {
                seedInput.disabled = true;
                seedInput.value = -1;
            }
        }

        async function generateStoryboard() {
            const storyInput = document.getElementById('storyInput').value.trim();
            const frameCount = parseInt(document.getElementById('frameCount').value);

            if (!storyInput) {
                alert('請輸入劇本描述');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            try {
                let systemPrompt = `You are generating prompts for a ${frameCount}-frame storyboard using NetaYume Lumina model.

Mode: ${appState.storyboardMode}

`;

                if (appState.storyboardMode === 'stacking') {
                    systemPrompt += `STACKING MODE RULES:
1. Frame 1: Full detailed prompt based on user input
2. Frames 2-${frameCount}: ONLY describe what CHANGES or is ADDED
3. DO NOT repeat unchanged elements
4. If clothing covers something, REMOVE the covered item from description
5. Focus on cumulative additions

Example:
Frame 1: 1girl, long hair, underwear, standing, bedroom
Frame 2: + white shirt (removes 'underwear' since it's covered)
Frame 3: + blue jeans
Frame 4: + jacket, outdoor, street`;

                } else if (appState.storyboardMode === 'event') {
                    systemPrompt += `EVENT MODE RULES:
1. Keep character appearance consistent
2. Change actions, poses, or scenes
3. Each frame is independent but features same character
4. Maintain style and quality tags`;

                } else {
                    systemPrompt += `STORY MODE RULES:
1. Create narrative progression with cause and effect
2. Can change characters, scenes, emotions
3. Tell a coherent story across frames`;
                }

                systemPrompt += `\n\nOutput format (one line per frame):
Frame N: [prompt here]

Use # for characters, @ for artists. Keep prompts concise.`;

                const response = await fetch(appState.lmStudioUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "local-model",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Generate ${frameCount} frames: ${storyInput}` }
                        ],
                        temperature: 0.8,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) throw new Error('LM Studio 連線失敗');

                const data = await response.json();
                const generatedText = data.choices[0].message.content;

                // Parse frames
                const frameLines = generatedText.split('\n').filter(line => line.trim().startsWith('Frame'));
                appState.storyboardFrames = frameLines.map((line, index) => {
                    const promptMatch = line.match(/Frame \d+:\s*(.+)/);
                    return {
                        number: index + 1,
                        prompt: promptMatch ? promptMatch[1].trim() : line
                    };
                });

                renderStoryboardFrames();

            } catch (error) {
                console.error('Storyboard generation error:', error);
                alert('分鏡生成失敗: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '📝 生成分鏡提示詞';
            }
        }

        function renderStoryboardFrames() {
            const container = document.getElementById('storyboardFrames');
            container.innerHTML = '';

            if (appState.storyboardFrames.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">分鏡提示詞將在此顯示</p>';
                return;
            }

            appState.storyboardFrames.forEach(frame => {
                const item = document.createElement('div');
                item.className = 'frame-item';
                item.innerHTML = `
                    <div class="frame-number">第 ${frame.number} 張</div>
                    <div class="frame-prompt">${frame.prompt}</div>
                `;
                container.appendChild(item);
            });
        }

        async function batchRender() {
            if (appState.storyboardFrames.length === 0) {
                alert('請先生成分鏡提示詞');
                return;
            }

            if (!confirm(`確定要生成 ${appState.storyboardFrames.length} 張圖片嗎？`)) {
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 批次生成中...';

            try {
                let currentSeed = appState.seedMode === 'fixed' ?
                    parseInt(document.getElementById('seedValue').value) : -1;

                for (let i = 0; i < appState.storyboardFrames.length; i++) {
                    const frame = appState.storyboardFrames[i];

                    // Determine seed for this frame
                    let frameSeed;
                    if (appState.seedMode === 'all-random') {
                        frameSeed = -1;
                    } else if (appState.seedMode === 'first-random') {
                        if (i === 0) {
                            frameSeed = -1; // First frame random
                        } else if (currentSeed === -1) {
                            // Use seed from first frame result (in real implementation)
                            frameSeed = Math.floor(Math.random() * 1000000);
                            currentSeed = frameSeed;
                        } else {
                            frameSeed = currentSeed;
                        }
                    } else {
                        frameSeed = currentSeed;
                    }

                    // Build full prompt for stacking mode
                    let fullPrompt = frame.prompt;
                    if (appState.storyboardMode === 'stacking' && i > 0) {
                        // In stacking mode, combine all previous frames
                        fullPrompt = appState.storyboardFrames
                            .slice(0, i + 1)
                            .map(f => f.prompt)
                            .join(', ');
                    }

                    await submitToComfyUI(fullPrompt, frameSeed, `Storyboard ${i + 1}`);

                    // Small delay between requests
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                alert('批次發送完成！請查看歷史紀錄標籤');
                switchTab('history');

            } catch (error) {
                console.error('Batch render error:', error);
                alert('批次生成失敗: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 批次生圖';
            }
        }

        // ==================== ComfyUI Integration ====================
        async function testConnection() {
            const url = document.getElementById('comfyUrl').value;
            const indicator = document.getElementById('connectionStatus');

            try {
                const response = await fetch(`${url}/system_stats`, { method: 'GET' });
                if (response.ok) {
                    indicator.className = 'status-indicator online';
                    indicator.title = 'ComfyUI 線上';
                } else {
                    throw new Error('連線失敗');
                }
            } catch (error) {
                indicator.className = 'status-indicator offline';
                indicator.title = 'ComfyUI 離線';
            }
        }

        async function renderImage() {
            const prompt = document.getElementById('promptEditor').value.trim();

            if (!prompt) {
                alert('請輸入提示詞');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            try {
                await submitToComfyUI(prompt, -1, 'Single Image');
                alert('已發送至 ComfyUI 佇列！請查看歷史紀錄標籤');
                switchTab('history');
            } catch (error) {
                console.error('Render error:', error);
                alert('生圖失敗: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '⚡ 極速生圖';
            }
        }

        async function submitToComfyUI(prompt, seed, label) {
            const url = document.getElementById('comfyUrl').value;
            const width = parseInt(document.getElementById('imageWidth').value);
            const height = parseInt(document.getElementById('imageHeight').value);
            const checkpoint = document.getElementById('checkpointModel').value;

            // Use random seed if seed is -1
            const actualSeed = seed === -1 ? Math.floor(Math.random() * 1000000000) : seed;

            // Create history entry
            const historyItem = {
                id: Date.now(),
                prompt: prompt,
                status: 'queue',
                timestamp: new Date().toLocaleString('zh-TW'),
                label: label,
                width: width,
                height: height,
                seed: actualSeed,
                imageUrl: null
            };

            appState.history.unshift(historyItem);
            saveHistory();
            renderHistory();

            // Build ComfyUI workflow for NetaYume Lumina
            const workflow = {
                prompt: {
                    "6": {
                        "inputs": {
                            "seed": actualSeed,
                            "steps": 25,
                            "cfg": 4.5,
                            "sampler_name": "euler",
                            "scheduler": "simple",
                            "denoise": 1,
                            "model": ["41", 0],
                            "positive": ["39", 0],
                            "negative": ["42", 0],
                            "latent_image": ["13", 0]
                        },
                        "class_type": "KSampler"
                    },
                    "9": {
                        "inputs": {
                            "filename_prefix": "NetaYume",
                            "images": ["43", 0]
                        },
                        "class_type": "SaveImage"
                    },
                    "13": {
                        "inputs": {
                            "width": width,
                            "height": height,
                            "batch_size": 1
                        },
                        "class_type": "EmptySD3LatentImage"
                    },
                    "37": {
                        "inputs": {
                            "value": prompt
                        },
                        "class_type": "PrimitiveStringMultiline"
                    },
                    "38": {
                        "inputs": {
                            "string_a": "You are an assistant designed to generate anime images based on textual prompts. <Prompt Start>",
                            "string_b": ["37", 0],
                            "delimiter": " "
                        },
                        "class_type": "StringConcatenate"
                    },
                    "39": {
                        "inputs": {
                            "text": ["38", 0],
                            "clip": ["41", 1]
                        },
                        "class_type": "CLIPTextEncode"
                    },
                    "41": {
                        "inputs": {
                            "ckpt_name": checkpoint
                        },
                        "class_type": "CheckpointLoaderSimple"
                    },
                    "42": {
                        "inputs": {
                            "text": "You are an assistant designed to generate anime images based on textual prompts. <Prompt Start> blurry, worst quality, low quality, deformed hands, bad anatomy, extra limbs, poorly drawn face, mutated, extra eyes, bad proportions",
                            "clip": ["41", 1]
                        },
                        "class_type": "CLIPTextEncode"
                    },
                    "43": {
                        "inputs": {
                            "samples": ["6", 0],
                            "vae": ["41", 2]
                        },
                        "class_type": "VAEDecode"
                    }
                }
            };

            // Submit to ComfyUI
            try {
                const response = await fetch(`${url}/prompt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(workflow)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`ComfyUI 提交失敗: ${response.status} ${errorText}`);
                }

                const data = await response.json();
                historyItem.promptId = data.prompt_id;

                // Start polling for result
                pollComfyUIResult(historyItem.id, data.prompt_id);

            } catch (error) {
                console.error('Submit to ComfyUI error:', error);
                historyItem.status = 'failed';
                historyItem.error = error.message;
                saveHistory();
                renderHistory();
                throw error;
            }
        }

        async function pollComfyUIResult(historyId, promptId) {
            const url = document.getElementById('comfyUrl').value;
            const maxAttempts = 100;
            let attempts = 0;

            const poll = setInterval(async () => {
                attempts++;

                if (attempts > maxAttempts) {
                    clearInterval(poll);
                    updateHistoryStatus(historyId, 'failed');
                    return;
                }

                try {
                    const response = await fetch(`${url}/history/${promptId}`);
                    if (!response.ok) return;

                    const data = await response.json();

                    if (data[promptId] && data[promptId].outputs) {
                        clearInterval(poll);

                        // Get image URL
                        const outputs = data[promptId].outputs;
                        const saveImageNode = Object.values(outputs).find(node => node.images);

                        if (saveImageNode && saveImageNode.images.length > 0) {
                            const image = saveImageNode.images[0];
                            const imageUrl = `${url}/view?filename=${image.filename}&subfolder=${image.subfolder || ''}&type=${image.type}`;

                            updateHistoryStatus(historyId, 'success', imageUrl);
                        }
                    }

                } catch (error) {
                    console.error('Polling error:', error);
                }

            }, 3000); // Poll every 3 seconds
        }

        function updateHistoryStatus(historyId, status, imageUrl = null) {
            const item = appState.history.find(h => h.id === historyId);
            if (item) {
                item.status = status;
                if (imageUrl) item.imageUrl = imageUrl;
                saveHistory();
                renderHistory();
            }
        }

        // ==================== History Functions ====================
        function saveHistory() {
            localStorage.setItem('starHistory', JSON.stringify(appState.history));
        }

        function loadHistory() {
            const saved = localStorage.getItem('starHistory');
            if (saved) {
                appState.history = JSON.parse(saved);
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyGrid');
            container.innerHTML = '';

            if (appState.history.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">尚無歷史紀錄</p>';
                return;
            }

            appState.history.forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';

                const statusClass = item.status === 'success' ? 'status-success' :
                                  item.status === 'failed' ? 'status-failed' : 'status-queue';
                const statusText = item.status === 'success' ? '完成' :
                                 item.status === 'failed' ? '失敗' : '佇列中';

                const errorInfo = item.status === 'failed' && item.error ?
                    `<div style="padding: 8px; font-size: 11px; color: var(--accent-red);">${item.error}</div>` : '';

                historyItem.innerHTML = `
                    <div class="history-image" onclick="openLightbox(${index})">
                        ${item.imageUrl ? `<img src="${item.imageUrl}" alt="Generated">` : '⏳'}
                        <div class="history-status ${statusClass}">${statusText}</div>
                    </div>
                    ${errorInfo}
                    <div class="history-actions">
                        ${item.imageUrl ? `<button class="action-btn" onclick="upscaleImage(${index})">🔍 放大</button>` : ''}
                        <button class="action-btn" onclick="deleteHistory(${index})">🗑️ 刪除</button>
                    </div>
                `;

                container.appendChild(historyItem);
            });
        }

        function deleteHistory(index) {
            if (!confirm('確定要刪除此紀錄嗎？')) return;

            appState.history.splice(index, 1);
            saveHistory();
            renderHistory();
        }

        async function upscaleImage(index) {
            const item = appState.history[index];
            if (!item.imageUrl) {
                alert('圖片尚未生成');
                return;
            }

            if (!confirm('確定要放大此圖片嗎？')) return;

            const url = document.getElementById('comfyUrl').value;
            const upscaleModel = document.getElementById('upscaleModel').value;

            try {
                // Step 1: Download the image
                const imageResponse = await fetch(item.imageUrl);
                const imageBlob = await imageResponse.blob();

                // Step 2: Upload to ComfyUI input folder
                const formData = new FormData();
                const filename = `upscale_${Date.now()}.png`;
                formData.append('image', imageBlob, filename);
                formData.append('overwrite', 'true');

                const uploadResponse = await fetch(`${url}/upload/image`, {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResponse.ok) {
                    throw new Error('圖片上傳失敗');
                }

                const uploadData = await uploadResponse.json();
                const uploadedFilename = uploadData.name || filename;

                // Step 3: Submit upscale workflow
                const workflow = {
                    prompt: {
                        "60": {
                            "inputs": {
                                "image": uploadedFilename,
                                "upload": "image"
                            },
                            "class_type": "LoadImage"
                        },
                        "50": {
                            "inputs": {
                                "model_name": upscaleModel
                            },
                            "class_type": "UpscaleModelLoader"
                        },
                        "51": {
                            "inputs": {
                                "upscale_model": ["50", 0],
                                "image": ["60", 0]
                            },
                            "class_type": "ImageUpscaleWithModel"
                        },
                        "9": {
                            "inputs": {
                                "filename_prefix": "NetaYume_HD",
                                "images": ["51", 0]
                            },
                            "class_type": "SaveImage"
                        }
                    }
                };

                const response = await fetch(`${url}/prompt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(workflow)
                });

                if (!response.ok) {
                    throw new Error('放大工作流提交失敗');
                }

                const data = await response.json();

                // Create new history entry for upscaled image
                const historyItem = {
                    id: Date.now(),
                    prompt: item.prompt + ' [Upscaled]',
                    status: 'queue',
                    timestamp: new Date().toLocaleString('zh-TW'),
                    label: item.label + ' (放大)',
                    width: item.width * 4,
                    height: item.height * 4,
                    seed: item.seed,
                    imageUrl: null,
                    promptId: data.prompt_id
                };

                appState.history.unshift(historyItem);
                saveHistory();
                renderHistory();

                // Start polling for result
                pollComfyUIResult(historyItem.id, data.prompt_id);

                alert('已發送放大任務至 ComfyUI！請查看歷史紀錄標籤');

            } catch (error) {
                console.error('Upscale error:', error);
                alert('放大失敗: ' + error.message);
            }
        }

        // ==================== Lightbox Functions ====================
        function openLightbox(index) {
            const item = appState.history[index];
            if (!item.imageUrl) return;

            appState.lightboxIndex = index;
            const lightbox = document.getElementById('lightbox');
            const image = document.getElementById('lightboxImage');

            image.src = item.imageUrl;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigateLightbox(direction) {
            let newIndex = appState.lightboxIndex + direction;

            // Find next valid image
            while (newIndex >= 0 && newIndex < appState.history.length) {
                if (appState.history[newIndex].imageUrl) {
                    openLightbox(newIndex);
                    return;
                }
                newIndex += direction;
            }
        }

        // Close lightbox on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        // ==================== Tab Functions ====================
        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab contents
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // ==================== File Upload ====================
        document.getElementById('csvUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const lines = content.split('\n');

                appState.customArtists = [];
                lines.forEach(line => {
                    const [name, tag] = line.split(',').map(s => s.trim());
                    if (name && tag) {
                        appState.customArtists.push({ name, tag, nameEn: name });
                    }
                });

                renderCustomStyles();
                alert(`成功載入 ${appState.customArtists.length} 個自訂風格`);
            };
            reader.readAsText(file);
        });

        function renderCustomStyles() {
            const container = document.getElementById('customStyles');
            container.innerHTML = '';

            if (appState.customArtists.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">請上傳 Artist Tag CSV 檔案以載入自訂風格</p>';
                return;
            }

            appState.customArtists.forEach(artist => {
                const card = document.createElement('div');
                card.className = 'style-card';
                card.onclick = () => toggleStyle(artist);

                card.innerHTML = `
                    <div class="style-card-name">${artist.name}</div>
                    <div class="style-card-tag">${artist.tag}</div>
                `;

                if (appState.selectedStyles.find(s => s.tag === artist.tag)) {
                    card.classList.add('selected');
                }

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
