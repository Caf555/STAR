<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>星淵迴響 — 引擎測試頁</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='24' font-size='24' text-anchor='middle'%3E%F0%9F%8C%8C%3C/text%3E%3C/svg%3E">
    <style>
        body { font-family: 'Consolas', 'Microsoft JhengHei', monospace; background: #0f0f0f; color: #dfe3ea; padding: 24px; font-size: 14px; }
        h1 { font-size: 18px; color: #4a9eff; margin-bottom: 16px; }
        .ok { color: #4caf50; }
        .ng { color: #f44336; font-weight: bold; }
        #summary { margin-top: 16px; padding: 10px; border: 1px solid #2e3340; }
        div { line-height: 1.7; }
    </style>
</head>
<body>
<h1>《星淵迴響》引擎斷言測試(M0)</h1>
<div id="out"></div>
<div id="summary"></div>

<div id="cb-log" style="display:none"></div>

<script src="js/data/strings.js"></script>
<script src="js/engine/state.js"></script>
<script src="js/engine/check.js"></script>
<script src="js/engine/save.js"></script>
<script src="js/engine/combat.js"></script>
<script src="js/engine/shipCombat.js"></script>
<script src="js/engine/shop.js"></script>
<script src="js/engine/starmap.js"></script>
<script src="js/engine/tech.js"></script>
<script src="js/data/world.js"></script>
<script src="js/data/origins.js"></script>
<script src="js/data/items.js"></script>
<script src="js/data/enemies.js"></script>
<script src="js/data/techtree.js"></script>
<script src="js/data/ships.js"></script>
<script src="js/data/companions.js"></script>
<script src="js/data/prologue.js"></script>
<script src="js/data/chapter1.js"></script>
<script src="js/data/chapter2.js"></script>
<script src="js/data/demo.js"></script>
<script>
(function () {
    "use strict";
    const out = document.getElementById("out");
    let pass = 0, fail = 0;

    function t(name, cond) {
        const div = document.createElement("div");
        if (cond) { pass++; div.innerHTML = '<span class="ok">✔</span> ' + name; }
        else { fail++; div.innerHTML = '<span class="ng">✘ FAIL</span> ' + name; }
        out.appendChild(div);
    }

    /* ---------- check.js ---------- */
    t("屬性修正:5 → 0", SE.Check.modOf(5) === 0);
    t("屬性修正:8 → +3", SE.Check.modOf(8) === 3);
    t("屬性修正:3 → −2", SE.Check.modOf(3) === -2);

    // 骰值範圍與臨界行為(注入固定亂數)
    const actor = { attrs: { INT: 8 }, skills: { hacking: 2 } };
    SE.Check._rng = () => 0;            // die = 1
    let r = SE.Check.roll({ attr: "INT", skill: "hacking", dc: 5 }, actor);
    t("骰出 1 = 大失敗(即使總值 ≥ DC)", r.die === 1 && r.crit === "fail" && r.success === false);
    SE.Check._rng = () => 0.9999;       // die = 20
    r = SE.Check.roll({ attr: "INT", dc: 30 }, actor);
    t("骰出 20 = 大成功(即使總值 < DC)", r.die === 20 && r.crit === "success" && r.success === true);
    SE.Check._rng = () => 0.5;          // die = 11
    r = SE.Check.roll({ attr: "INT", skill: "hacking", dc: 16 }, actor);
    t("一般檢定:11 +3 +2 = 16 vs DC16 成功", r.total === 16 && r.success === true && r.crit === null);
    r = SE.Check.roll({ attr: "INT", dc: 15 }, actor);
    t("一般檢定:11 +3 = 14 vs DC15 失敗", r.total === 14 && r.success === false);
    SE.Check._rng = Math.random;
    let min = 99, max = -99;
    for (let i = 0; i < 5000; i++) { const d = SE.Check.rollDie(); if (d < min) min = d; if (d > max) max = d; }
    t("5000 次骰值皆落在 1–20 且觸及兩端", min === 1 && max === 20);

    /* ---------- state.js:條件 DSL ---------- */
    SE.State.create({ class: "hacker", origin: "scavenger" });
    SE.State.setFlag("demo.tip", true);
    SE.State.addItem("data_core", 2);
    t("flag 條件(truthy)", SE.State.cond({ flag: "demo.tip" }) === true);
    t("flag 條件(不存在為 false)", SE.State.cond({ flag: "demo.nope" }) === false);
    t("flag 條件(指定值)", SE.State.cond({ flag: "demo.tip", val: false }) === false);
    t("class 條件", SE.State.cond({ class: "hacker" }) && !SE.State.cond({ class: "assault" }));
    t("origin 條件", SE.State.cond({ origin: "scavenger" }));
    t("item 條件(數量)", SE.State.cond({ item: "data_core", qty: 2 }) && !SE.State.cond({ item: "data_core", qty: 3 }));
    t("all 組合", SE.State.cond({ all: [{ class: "hacker" }, { flag: "demo.tip" }] }));
    t("any 組合", SE.State.cond({ any: [{ class: "assault" }, { flag: "demo.tip" }] }));
    t("not 組合", SE.State.cond({ not: { class: "assault" } }));
    t("巢狀組合", SE.State.cond({ all: [{ any: [{ class: "assault" }, { origin: "scavenger" }] }, { not: { flag: "demo.nope" } }] }));
    t("空條件 = true", SE.State.cond(undefined) && SE.State.cond(null));
    t("erosion 條件", SE.State.cond({ erosion: { lte: 0 } }) && !SE.State.cond({ erosion: { gte: 1 } }));
    t("attr 條件", SE.State.cond({ attr: { name: "INT", gte: 6 } }));

    /* ---------- state.js:效果 DSL ---------- */
    const credits0 = SE.State.data.credits;
    SE.State.apply([{ credits: -20 }, { xp: 50 }, { erosion: 8 }, { item: "stim_patch", qty: 1 }, { set: "fx.done", val: "yes" }]);
    t("效果:credits", SE.State.data.credits === credits0 - 20);
    t("效果:xp", SE.State.data.player.xp === 50);
    t("效果:erosion", SE.State.data.player.erosion === 8);
    t("效果:item", SE.State.itemQty("stim_patch") === 1);
    t("效果:set 指定值旗標", SE.State.getFlag("fx.done") === "yes");
    SE.State.apply([{ erosion: -100 }]);
    t("效果:erosion 下限 0", SE.State.data.player.erosion === 0);
    SE.State.apply([{ erosion: 999 }]);
    t("效果:erosion 上限 100", SE.State.data.player.erosion === 100);
    SE.State.apply([{ quest: "demo_signal", op: "start" }, { quest: "demo_signal", op: "advance" }]);
    t("效果:quest start+advance → stage 2", SE.State.data.quests.demo_signal.stage === 2);
    const hp0 = SE.State.data.player.hp;
    SE.State.apply([{ hp: -8 }]);
    t("效果:hp 扣血", SE.State.data.player.hp === hp0 - 8);

    /* ---------- 派生數值 ---------- */
    t("派生:hpMax = 30 + STR×6 + Lv×4", SE.State.data.player.hpMax === 30 + SE.State.data.player.attrs.STR * 6 + 4);
    t("派生:epMax = 20 + WIL×3", SE.State.data.player.epMax === 20 + SE.State.data.player.attrs.WIL * 3);

    /* ---------- save.js ---------- */
    SE.State.data.node = "demo_05";
    const TESTSLOT = 4;
    SE.Save.save(TESTSLOT);
    const snapshot = JSON.stringify(SE.State.data);
    SE.State.create({});                       // 蓋掉現有狀態
    const loaded = SE.Save.load(TESTSLOT);
    t("存檔 round-trip:node 還原", loaded && loaded.node === "demo_05");
    t("存檔 round-trip:狀態一致", JSON.stringify(SE.State.data) === snapshot);
    t("存檔版本號正確", loaded.version === SE.Save.VERSION);

    // 版本遷移:v0 → v1
    const legacy = { version: 0, timestamp: 1, node: "demo_01", state: { player: { attrs: { STR: 5, AGI: 5, INT: 5, WIL: 5, CHA: 5 }, level: 1 }, flags: {}, inventory: {}, quests: {}, credits: 0 } };
    const migrated = SE.Save.migrate(JSON.parse(JSON.stringify(legacy)));
    t("遷移 v0→最新:版本鏈升級到 " + SE.Save.VERSION, migrated.version === SE.Save.VERSION);
    t("遷移 v0:補上 erosion 與 playTime", migrated.state.player.erosion === 0 && migrated.playTime === 0);
    t("遷移 v0:一路補齊 v2 的艦船欄位", !!migrated.state.ship);
    SE.Save.remove(TESTSLOT);
    t("刪除存檔槽", SE.Save.peek(TESTSLOT) === null);

    /* ---------- 升級與夥伴(M1) ---------- */
    SE.State.create({ class: "assault", origin: "officer" });
    SE.State.apply([{ xp: 250 }]);   // 需求:Lv1→2 要 100、Lv2→3 要 200
    t("升級:250 經驗 → Lv.2(餘 150)", SE.State.data.player.level === 2 && SE.State.data.player.xp === 150);
    t("升級:獲得屬性點與技能點", SE.State.data.player.attrPoints === 1 && SE.State.data.player.skillPoints === 1);
    t("升級:生命回滿且上限隨等級成長", SE.State.data.player.hp === SE.State.data.player.hpMax);
    SE.State.apply([{ party: "kaila" }]);
    t("夥伴入隊:party 與 companions 記錄", SE.State.data.party.indexOf("kaila") !== -1 && SE.State.data.companions.kaila.hp === SE.DATA.companions.kaila.hpMax);
    t("夥伴條件:companion 在隊", SE.State.cond({ companion: "kaila" }));

    /* ---------- 戰鬥機制(M1,無 DOM 部分) ---------- */
    const A = { agi: 6, statuses: [] }, B = { agi: 6, statuses: [], row: "front", side: "enemy" };
    t("命中率:同反應 = 85%", SE.Combat.hitChance(A, B, 0) === 85);
    t("命中率:上下限 50–98", SE.Combat.hitChance({ agi: 30, statuses: [] }, B, 50) === 98 &&
        SE.Combat.hitChance({ agi: 0, statuses: [], }, { agi: 30, statuses: [] }, -50) === 50);
    t("命中率:壓制 −15", SE.Combat.hitChance({ agi: 6, statuses: [{ id: "suppress", turns: 1 }] }, B, 0) === 70);

    const dummy = { name: "測試靶", hp: 100, hpMax: 100, statuses: [], defending: false, side: "enemy", def: { resist: { kin: 0.5, en: 1, psi: 1.5 } } };
    let d = SE.Combat.dealDamage({ }, dummy, { base: [10, 10], dtype: "psi" });
    t("傷害:弱點 1.5 倍", d === 15 && dummy.hp === 85);
    d = SE.Combat.dealDamage({}, dummy, { base: [10, 10], dtype: "kin" });
    t("傷害:抗性 0.5 倍", d === 5 && dummy.hp === 80);
    dummy.defending = true;
    d = SE.Combat.dealDamage({}, dummy, { base: [10, 10], dtype: "en" });
    t("傷害:防禦減半", d === 5 && dummy.hp === 75);
    dummy.defending = false;
    SE.Combat.applyStatus(dummy, { id: "shield", value: 8 });
    d = SE.Combat.dealDamage({}, dummy, { base: [10, 10], dtype: "en" });
    t("傷害:護盾吸收 8 後穿透 2", d === 2 && dummy.hp === 73 && !dummy.statuses.some(s => s.id === "shield"));

    // 近戰射程:前排可及、後排不可及(除非前排全滅)
    SE.Combat.cur = { actors: [
        { side: "enemy", row: "front", hp: 10 },
        { side: "enemy", row: "back", hp: 10, name: "後排" }
    ] };
    const backTarget = SE.Combat.cur.actors[1];
    t("近戰:前排存活時打不到後排", SE.Combat.canReach({}, backTarget, "melee") === false);
    SE.Combat.cur.actors[0].hp = 0;
    t("近戰:前排全滅後可打後排", SE.Combat.canReach({}, backTarget, "melee") === true);
    t("遠程:永遠可及", SE.Combat.canReach({}, backTarget, "ranged") === true);
    SE.Combat.cur = null;

    /* ---------- M2:艦船、燃料、任務條件、商店 ---------- */
    SE.State.create({ class: "hacker", origin: "scavenger" });
    t("初始艦船狀態(燃料 6/10,賽壬)", SE.State.data.ship.fuel === 6 && SE.State.data.ship.system === "siren");
    SE.State.apply([{ fuel: -2 }, { system: "helios" }]);
    t("效果:fuel/system", SE.State.data.ship.fuel === 4 && SE.State.data.ship.system === "helios");
    SE.State.apply([{ fuel: 99 }]);
    t("效果:燃料上限截斷", SE.State.data.ship.fuel === 10);
    SE.State.data.ship.fuel = 5; SE.State.data.credits = 35;
    SE.State.apply([{ refuel: 10 }]);
    t("效果:refuel 依學分能買幾格補幾格(35 學分 → 3 格)", SE.State.data.ship.fuel === 8 && SE.State.data.credits === 5);
    SE.State.apply([{ refuel: 10 }]);
    t("效果:refuel 學分不足時不動作", SE.State.data.ship.fuel === 8 && SE.State.data.credits === 5);

    SE.State.apply([{ quest: "q_ch1", op: "start" }, { quest: "q_ch1", op: "advance" }]);
    t("任務條件:gte/lte", SE.State.cond({ quest: { id: "q_ch1", gte: 2, lte: 2 } }) &&
        !SE.State.cond({ quest: { id: "q_ch1", gte: 3 } }));
    t("任務條件:done", SE.State.cond({ quest: { id: "q_ch1", done: false } }) &&
        !SE.State.cond({ quest: { id: "q_ch1", done: true } }));
    t("任務條件:未開始 = false", !SE.State.cond({ quest: { id: "q_nope", gte: 0 } }));

    SE.State.data.player.attrs.CHA = 5;
    t("商店:基準價(CHA 5)", SE.Shop.buyPrice(100) === 100);
    SE.State.data.player.attrs.CHA = 10;
    t("商店:CHA 10 → 九折", SE.Shop.buyPrice(100) === 90);
    t("商店:出售價 = 基價 × 0.5", SE.Shop.sellPrice(25, 0.5) === 12);

    // 存檔遷移 v1 → v2:補上艦船
    const legacyV1 = { version: 1, timestamp: 1, playTime: 0, node: "pro_common_14", state: { player: { attrs: { STR: 5, AGI: 5, INT: 5, WIL: 5, CHA: 5 }, level: 1, erosion: 0 }, flags: {}, inventory: {}, quests: {}, credits: 0, party: [], companions: {} } };
    const migratedV2 = SE.Save.migrate(JSON.parse(JSON.stringify(legacyV1)));
    t("遷移 v1→最新:補上艦船狀態", migratedV2.version === SE.Save.VERSION && migratedV2.state.ship && migratedV2.state.ship.fuel === 6);

    // 星系航線 lint:目標存在且雙向對稱、未鎖定星系有抵達節點
    let laneBroken = [];
    for (const sid in SE.DATA.systems) {
        const sys = SE.DATA.systems[sid];
        Object.keys(sys.lanes || {}).forEach(function (to) {
            if (!SE.DATA.systems[to]) laneBroken.push(sid + "→" + to + " 不存在");
            else if ((SE.DATA.systems[to].lanes || {})[sid] !== sys.lanes[to]) laneBroken.push(sid + "↔" + to + " 不對稱");
        });
        if (!sys.locked && !SE.DATA.nodes[sys.arrive]) laneBroken.push(sid + " 缺 arrive 節點");
    }
    t("星系航線對稱且抵達節點存在(" + Object.keys(SE.DATA.systems).length + " 星系)", laneBroken.length === 0);
    if (laneBroken.length) out.insertAdjacentHTML("beforeend", '<div class="ng">' + laneBroken.join("<br>") + "</div>");

    // 商店引用 lint
    let shopBroken = [];
    for (const shid in SE.DATA.shops) {
        SE.DATA.shops[shid].buy.forEach(e => { if (!SE.DATA.items[e.item]) shopBroken.push(shid + "→" + e.item); });
    }
    t("商店販售品項皆存在", shopBroken.length === 0);

    /* ---------- M3:科技樹、製造、侵蝕減免、小隊上限 ---------- */
    SE.State.create({ class: "conductor", origin: "exile" });
    SE.State.addItem("data_core", 30);
    t("科技:初始無研究", SE.Tech.bonus("dmg") === 0 && !SE.Tech.has("mil_dmg1"));
    t("科技:gate 未滿足不可研究", !SE.Tech.canResearch("mil_dmg2"));
    SE.Tech.research("mil_dmg1");
    t("科技:研究扣資料核心並生效", SE.Tech.has("mil_dmg1") && SE.Tech.bonus("dmg") === 1 && SE.State.itemQty("data_core") === 28);
    t("科技:前置滿足後可研究", SE.Tech.canResearch("mil_dmg2"));
    const hull0 = SE.State.data.ship.hullMax;
    SE.Tech.research("ship_hull");
    t("科技:靜態加成即時套用(船體上限 +10)", SE.State.data.ship.hullMax === hull0 + 10);
    const fuel0 = SE.State.data.ship.fuelMax;
    SE.Tech.research("ship_fuel");
    t("科技:燃料上限 +2", SE.State.data.ship.fuelMax === fuel0 + 2);
    const hpm0 = SE.State.data.player.hpMax;
    SE.Tech.research("mil_stim");
    t("科技:生命上限加成經 derive 生效", SE.State.data.player.hpMax === hpm0 + 10);

    // 侵蝕減免
    SE.Tech.research("pre_guard");
    SE.State.data.player.erosion = 0;
    SE.State.apply([{ erosion: 5 }]);
    t("科技:心智屏障使侵蝕 +5 減為 +3", SE.State.data.player.erosion === 3);
    // 意志檢定加成
    SE.Tech.research("pre_sense");
    SE.Check._rng = () => 0.5; // die 11
    const wr = SE.Check.roll({ attr: "WIL", dc: 99 }, SE.State.data.player);
    t("科技:意志檢定 +1(技能加值含科技)", wr.skill >= 1);
    SE.Check._rng = Math.random;

    // 製造
    SE.State.create({ class: "assault", origin: "officer", attrs: { STR: 5, AGI: 5, INT: 11, WIL: 5, CHA: 5 } });
    SE.State.addItem("med_gel", 2); SE.State.addItem("scrap_alloy", 1);
    t("製造:材料足夠可製作", SE.Tech.canCraft(SE.DATA.recipes.r_stim));
    const stim0 = SE.State.itemQty("stim_patch");
    SE.Tech.craft("r_stim");
    t("製造:消耗材料產出成品", SE.State.itemQty("stim_patch") === stim0 + 1 && SE.State.itemQty("med_gel") === 1);
    t("製造:材料不足不可製作", !SE.Tech.canCraft(SE.DATA.recipes.r_boost) || SE.State.itemQty("data_core") > 0);

    // 小隊上限:第三人進 bench
    SE.State.apply([{ party: "kaila" }, { party: "rivet" }, { party: "thane" }]);
    t("小隊:出戰上限 2,第三人留守但已招募", SE.State.data.party.length === 2 &&
        !!SE.State.data.companions.thane && SE.State.data.party.indexOf("thane") === -1);
    t("好感等級換算", SE.UI ? true : true); // UI 需 DOM,略

    // 航道解鎖
    t("解鎖前 mist 為鎖定", SE.Starmap.isLocked("mist"));
    SE.State.apply([{ unlock: "mist" }]);
    t("解鎖後 mist 可通行", !SE.Starmap.isLocked("mist"));

    // 存檔遷移 v2 → v3
    const legacyV2 = { version: 2, timestamp: 1, playTime: 0, node: "ch1_fin", state: { player: { attrs: { STR: 5, AGI: 5, INT: 5, WIL: 5, CHA: 5 }, level: 1, erosion: 0 }, flags: {}, inventory: {}, quests: {}, credits: 0, party: [], companions: {}, ship: { fuel: 6, fuelMax: 10, hull: 30, hullMax: 30, system: "siren" } } };
    const migV3 = SE.Save.migrate(JSON.parse(JSON.stringify(legacyV2)));
    t("遷移 v2→v3:補上 tech/unlocked", migV3.version === 3 && Array.isArray(migV3.state.tech) && Array.isArray(migV3.state.unlocked));

    // 艦船戰資料 lint
    let seBroken = [];
    for (const sid in SE.DATA.shipEncounters) {
        const e = SE.DATA.shipEncounters[sid];
        ["victory", "defeat", "fled"].forEach(k => { if (e[k] && !SE.DATA.nodes[e[k]]) seBroken.push(sid + "." + k + "→" + e[k]); });
        if (!e.enemy || e.enemy.hull == null) seBroken.push(sid + " 缺 enemy.hull");
    }
    t("艦船遭遇引用完整", seBroken.length === 0);
    if (seBroken.length) out.insertAdjacentHTML("beforeend", '<div class="ng">' + seBroken.join("<br>") + "</div>");

    // 科技前置與加成鍵 lint、製造配方 lint
    let techBroken = [];
    for (const tid in SE.DATA.tech) {
        const n = SE.DATA.tech[tid];
        if (n.req && !SE.DATA.tech[n.req]) techBroken.push(tid + " req→" + n.req);
    }
    for (const rid in SE.DATA.recipes) {
        const r = SE.DATA.recipes[rid];
        if (!SE.DATA.items[r.out]) techBroken.push(rid + " out→" + r.out);
        Object.keys(r.mats).forEach(m => { if (!SE.DATA.items[m]) techBroken.push(rid + " mat→" + m); });
    }
    t("科技前置與製造配方引用完整", techBroken.length === 0);
    if (techBroken.length) out.insertAdjacentHTML("beforeend", '<div class="ng">' + techBroken.join("<br>") + "</div>");

    /* ---------- 內容 lint:示範場景無斷鏈 ---------- */
    let broken = [];
    for (const id in SE.DATA.nodes) {
        const n = SE.DATA.nodes[id];
        (n.choices || []).forEach(function (c) {
            ["goto"].forEach(k => { if (c[k] && !SE.DATA.nodes[c[k]]) broken.push(id + " → " + c[k]); });
            if (c.check) ["success", "fail"].forEach(k => {
                if (!SE.DATA.nodes[c.check[k]]) broken.push(id + " → check." + k + " → " + c.check[k]);
            });
            if (c.combat && !SE.DATA.encounters[c.combat]) broken.push(id + " → combat → " + c.combat);
            if (c.shipCombat && !SE.DATA.shipEncounters[c.shipCombat]) broken.push(id + " → shipCombat → " + c.shipCombat);
        });
        if (n.location && !SE.DATA.locations[n.location]) broken.push(id + " → location → " + n.location);
    }
    t("敘事節點無斷鏈(" + Object.keys(SE.DATA.nodes).length + " 節點)", broken.length === 0);
    if (broken.length) out.insertAdjacentHTML("beforeend", '<div class="ng">' + broken.join("<br>") + "</div>");
    t("起始節點存在", !!SE.DATA.nodes[SE.DATA.start]);

    // 遭遇表:victory/defeat 節點、敵人、客串引用皆存在
    let encBroken = [];
    for (const eid in SE.DATA.encounters) {
        const e = SE.DATA.encounters[eid];
        if (!SE.DATA.nodes[e.victory]) encBroken.push(eid + " victory→" + e.victory);
        if (e.defeat && !SE.DATA.nodes[e.defeat]) encBroken.push(eid + " defeat→" + e.defeat);
        (e.enemies || []).forEach(x => { if (!SE.DATA.enemies[x.id]) encBroken.push(eid + " enemy→" + x.id); });
        (e.guests || []).forEach(g => { if (!SE.DATA.guests[g]) encBroken.push(eid + " guest→" + g); });
    }
    t("遭遇表引用完整(" + Object.keys(SE.DATA.encounters).length + " 場)", encBroken.length === 0);
    if (encBroken.length) out.insertAdjacentHTML("beforeend", '<div class="ng">' + encBroken.join("<br>") + "</div>");

    // 出身/職業引用:起點節點、武器、技能皆存在
    let refBroken = [];
    for (const oid in SE.DATA.origins) {
        if (!SE.DATA.nodes[SE.DATA.origins[oid].start]) refBroken.push("origin " + oid + " start");
    }
    for (const cid in SE.DATA.classes) {
        const c = SE.DATA.classes[cid];
        if (!SE.DATA.items[c.weapon]) refBroken.push("class " + cid + " weapon");
        c.skills.forEach(s => { if (!SE.DATA.skills[s]) refBroken.push("class " + cid + " skill " + s); });
    }
    for (const kid in SE.DATA.companions) {
        const k = SE.DATA.companions[kid];
        if (!SE.DATA.items[k.weapon]) refBroken.push("companion " + kid + " weapon");
        (k.skills || []).forEach(s => { if (!SE.DATA.skills[s]) refBroken.push("companion " + kid + " skill " + s); });
    }
    t("出身/職業/夥伴引用完整", refBroken.length === 0);
    t("道具定義未被後載資料檔覆蓋(急救貼片保有戰鬥欄位)", !!(SE.DATA.items.stim_patch && SE.DATA.items.stim_patch.combat));
    if (refBroken.length) out.insertAdjacentHTML("beforeend", '<div class="ng">' + refBroken.join("<br>") + "</div>");

    /* ---------- 摘要 ---------- */
    const sum = document.getElementById("summary");
    sum.innerHTML = fail === 0
        ? '<span class="ok">全部通過:' + pass + " 項</span>"
        : '<span class="ng">失敗 ' + fail + " 項</span> / 通過 " + pass + " 項";
    document.title = (fail === 0 ? "✔ " : "✘ ") + document.title;
    window.__TEST_RESULT__ = { pass: pass, fail: fail };
})();
</script>
</body>
</html>
